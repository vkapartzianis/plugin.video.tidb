# This workflow performs the required add-on checks
# for TheIntroDB Kodi addon

name: Kodi Addon Check
on:
  # Run action when pushed to main, or for commits in a pull request.
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
jobs:
  tests:
    name: Addon checker
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        path: ${{ github.repository }}
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: 3.12
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --user kodi-addon-checker
    - name: Remove unwanted files
      run: awk '/export-ignore/ { print $1 }' .gitattributes | xargs rm -rf --
      working-directory: ${{ github.repository }}
      continue-on-error: true
    - name: Run kodi-addon-checker on main addon
      run: $HOME/.local/bin/kodi-addon-checker --branch=main ${{ github.repository }}/plugin.video.tidb.kine/
      continue-on-error: true